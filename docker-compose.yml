services:
  backend:
    build: ./backend
    ports:
      - "8010:8000"
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3010:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
